<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Le Chat Noir</title>
    <meta
      name="description"
      content="Prototype minimal du futur site Le Chat Noir avec bandeau fixe, menu simple et navigation interne."
    />
    <meta name="theme-color" content="#05070c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Le Chat Noir" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="assets/js/content-data.js"></script>
    <script defer src="assets/js/page-common.js"></script>
    <script defer src="assets/js/news-data.js"></script>
    <script defer src="assets/js/app-utils.js"></script>
    <script defer src="assets/js/app-renderers.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="top-shell" id="topShell">
      <div class="top-shell__inner">
        <section class="top-banner" aria-label="Informations de la radio">
          <a class="brand" href="#accueil" data-route-link="accueil" aria-label="Le Chat Noir">
            <img class="brand__logo" src="assets/media/brand/logo.png" alt="Logo Le Chat Noir" />
            <div class="brand__copy">
              <span class="brand__name">Le Chat Noir</span>
              <span class="brand__description">Laboratoire radiophonique indépendant</span>
            </div>
          </a>

          <section class="player-strip" aria-label="Lecteur audio">
            <div class="player-strip__controls">
              <button class="player-strip__toggle" id="playerToggle" type="button" aria-pressed="false" aria-label="Lancer le direct">
                <span id="playerToggleIcon" aria-hidden="true"></span>
              </button>

              <div class="player-strip__meta">
                <span class="player-strip__label">Direct</span>
                <div class="player-strip__volume">
                  <label class="player-strip__volume-label" for="volumeRange">Volume</label>
                  <input
                    class="player-strip__volume-range"
                    id="volumeRange"
                    type="range"
                    min="0"
                    max="100"
                    step="1"
                    value="100"
                    aria-label="Régler le volume du direct"
                  />
                </div>
              </div>
            </div>

            <div class="player-strip__ticker" id="nowPlayingTicker" aria-live="polite" aria-label="Now playing">
              <div class="player-strip__ticker-track" id="nowPlayingTickerTrack">
                <span class="player-strip__ticker-text" id="nowPlayingTickerText">Chargement...</span>
                <span class="player-strip__ticker-separator" aria-hidden="true">•</span>
                <span class="player-strip__ticker-text player-strip__ticker-text--clone" id="nowPlayingTickerTextClone" aria-hidden="true">
                  Chargement...
                </span>
              </div>
            </div>
          </section>

          <div class="on-air" aria-live="polite">
            <span class="on-air__label">À l'antenne</span>

            <div class="on-air__status">
              <span class="signal-indicator is-offline" id="signalIndicator" role="img" aria-label="Flux audio indisponible">
                <span class="signal-indicator__dot"></span>
                <span class="signal-indicator__wave"></span>
                <span class="signal-indicator__wave signal-indicator__wave--late"></span>
              </span>

              <strong class="on-air__value" id="currentShowText">Chargement...</strong>
            </div>
          </div>
        </section>

        <button
          class="mobile-nav-toggle"
          id="mobileNavToggle"
          type="button"
          aria-expanded="false"
          aria-controls="mainNav"
          aria-label="Ouvrir le menu des rubriques"
        >
          <span class="mobile-nav-toggle__eyebrow">Rubriques</span>
          <span class="mobile-nav-toggle__row">
            <span class="mobile-nav-toggle__label" id="mobileNavCurrentLabel">Accueil</span>
            <span class="mobile-nav-toggle__chevron" aria-hidden="true"></span>
          </span>
        </button>

        <nav class="main-nav" id="mainNav" aria-label="Rubriques principales">
          <button class="pill-button pill-button--nav main-nav__button" type="button" data-route="accueil">Accueil</button>
          <button class="pill-button pill-button--nav main-nav__button" type="button" data-route="actualites">Actualités</button>
          <button class="pill-button pill-button--nav main-nav__button" type="button" data-route="grille">Grille</button>
          <button class="pill-button pill-button--nav main-nav__button" type="button" data-route="historique">Historique</button>
          <button class="pill-button pill-button--nav main-nav__button" type="button" data-route="voix">Voix</button>
          <button class="pill-button pill-button--nav main-nav__button" type="button" data-route="apropos">À propos</button>
        </nav>
      </div>

      <audio id="radioAudio" preload="none" crossorigin="anonymous"></audio>
    </header>

    <main class="site-main">
      <div class="site-main__inner">
        <section class="page-view" id="pageView" aria-live="polite"></section>
        <footer class="site-footer" aria-label="Pied de page du site">
          <p class="site-footer__signature">
            · Le Chat Noir - Avril 2026
            <svg
              class="svg-icon site-footer__icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.85"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
              focusable="false"
            >
              <path d="M7 9V5.5l2.6 1.9L12 5.7l2.4 1.7L17 5.5V9"></path>
              <path d="M5.3 10.4C5.3 7.9 7.9 6 12 6s6.7 1.9 6.7 4.4c0 2-1.1 3.8-2.9 4.9V18a1 1 0 0 1-1.6.8L12 17.2l-2.2 1.6a1 1 0 0 1-1.6-.8v-2.7c-1.8-1.1-2.9-2.9-2.9-4.9z"></path>
              <circle cx="9.4" cy="11.8" r="0.7" fill="currentColor" stroke="none"></circle>
              <circle cx="14.6" cy="11.8" r="0.7" fill="currentColor" stroke="none"></circle>
              <path d="M10.1 14.3c1.1.8 2.7.8 3.8 0"></path>
            </svg>
          </p>
        </footer>
      </div>
    </main>

    <button
      class="scroll-top-button"
      id="scrollTopButton"
      type="button"
      aria-label="Revenir en haut de page"
      title="Revenir en haut"
    >
      <svg
        class="svg-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.85"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
        focusable="false"
      >
        <path d="M12 19V5"></path>
        <path d="m6 11 6-6 6 6"></path>
      </svg>
    </button>
  </body>
</html>
